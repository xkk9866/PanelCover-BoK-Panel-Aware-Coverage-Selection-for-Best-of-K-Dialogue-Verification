# --- KEMI-style baseline: full short training (300 steps on 4k subsample) ----
# Designed to finish on a single 48GB GPU in roughly an hour; the previous run
# stalled past step 280 due to a CUDA OOM-recovery hang, so this config caps
# the schedule at 300 steps and saves a final checkpoint that we use for the
# panel-aware evaluation.
model_name_or_path: D:/models_cache/Qwen/Qwen2___5-7B-Instruct
train_file: data/processed/train.chat.jsonl
dev_file: data/processed/dev.chat.jsonl
output_dir: runs/baseline_kemi_full

learning_rate: 1.0e-4
head_learning_rate: 3.0e-4
num_train_steps: 300
per_device_batch_size: 1
gradient_accumulation_steps: 4
warmup_ratio: 0.03
max_length: 1024
max_ctx_length: 800
bf16: true

lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target: q_proj,k_proj,v_proj,o_proj

train_subsample: 4000
dev_subsample: 64
log_every: 10
eval_every: 200
save_every: 100

use_rag: true
rag_corpus: data/processed/train.chat.jsonl
rag_k: 3
rag_mode: emotion_typed
rag_memory_chars: 600

use_state: true
use_strategy: true
use_transition: true
use_outcome: false
use_consist: false
use_sep: false
use_safety: true

lam_gen: 1.0
lam_state: 0.25
lam_strategy: 0.5
lam_transition: 0.25
lam_safety: 0.2
lam_commit: 0.05

load_in_4bit: true
bnb_quant_type: nf4
bnb_double_quant: true
