# --- Recent baseline: TransESC (Zhou et al., ACL 2023) ---------------------
# "TransESC: Smoothing Emotional Support Conversation with Turn-level
#  State Transition".
# Core algorithmic choices we reproduce:
#   * Three turn-level transition signals jointly supervise the decoder:
#     (i) emotional-state transition, (ii) DA (strategy) transition, and
#     (iii) sentiment transition.  In our framework (i) = state head +
#     transition head, (ii) = strategy head, (iii) is approximated by the
#     outcome head's uptake + quality targets (they are explicit sentiment-
#     like affective signals derived from session-level feedback).  No
#     sign/stability structural priors.  No safety branch attribution to
#     TransESC --- we still enable the safety head for fairness against our
#     safety-aware ablation protocol.
#   * Commonsense-graph features (from ATOMIC) are omitted for the same
#     Chinese-data reason as MISC.
model_name_or_path: D:/models_cache/Qwen/Qwen2___5-7B-Instruct
train_file: data/processed/train.chat.jsonl
dev_file: data/processed/dev.chat.jsonl
output_dir: runs/baseline_transesc

learning_rate: 1.0e-4
head_learning_rate: 3.0e-4
num_train_steps: 400
per_device_batch_size: 1
gradient_accumulation_steps: 4
warmup_ratio: 0.03
max_length: 1024
max_ctx_length: 900
bf16: true

lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target: q_proj,k_proj,v_proj,o_proj

train_subsample: 8000
dev_subsample: 128
log_every: 10
eval_every: 150
save_every: 200

use_state: true
use_strategy: true
use_transition: true
use_outcome: true
use_consist: false
use_sep: false
use_safety: true

lam_gen: 1.0
lam_state: 0.3
lam_strategy: 0.5
lam_transition: 0.35
lam_outcome: 0.3
lam_safety: 0.2
lam_commit: 0.05
uptake_pos_weight: 3.0

load_in_4bit: true
bnb_quant_type: nf4
bnb_double_quant: true
