# --- Recent baseline: MISC (Tu et al., ACL 2022) ---------------------------
# "MIxed Strategy aware model integrating COMET for Emotional Support".
# Core algorithmic choices we reproduce:
#   * A strategy-aware response generator conditioned on a soft mixture over
#     emotional-support strategies (no hard argmax).  In our framework this
#     is realised by training the strategy head with cross-entropy but using
#     the soft softmax output as a prefix-side conditioning signal.  No
#     explicit user state, no controlled transition, no outcome supervision.
#   * COMET commonsense knowledge was used as extra context in the original
#     paper; since our corpus is Chinese counselling data without a Chinese
#     COMET-style knowledge graph, we omit the COMET branch (impossible to
#     reproduce faithfully) and only keep the soft-mixture strategy planner
#     --- the strategy-mixture contribution is what the paper calls its main
#     contribution over the DuCST baseline.
model_name_or_path: D:/models_cache/Qwen/Qwen2___5-7B-Instruct
train_file: data/processed/train.chat.jsonl
dev_file: data/processed/dev.chat.jsonl
output_dir: runs/baseline_misc

learning_rate: 1.0e-4
head_learning_rate: 3.0e-4
num_train_steps: 400
per_device_batch_size: 1
gradient_accumulation_steps: 4
warmup_ratio: 0.03
max_length: 1024
max_ctx_length: 900
bf16: true

lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target: q_proj,k_proj,v_proj,o_proj

train_subsample: 8000
dev_subsample: 128
log_every: 10
eval_every: 150
save_every: 200

use_state: false
use_strategy: true
use_transition: false
use_outcome: false
use_consist: false
use_sep: false
use_safety: true

# Loss weights: the original paper emphasises strategy planning, so we
# up-weight the strategy classifier.
lam_gen: 1.0
lam_strategy: 0.7
lam_safety: 0.2
lam_commit: 0.05

load_in_4bit: true
bnb_quant_type: nf4
bnb_double_quant: true
